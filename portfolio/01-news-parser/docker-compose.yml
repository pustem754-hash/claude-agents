version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: news-parser-rmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rmq_data:/var/lib/rabbitmq

volumes:
  rmq_data:
